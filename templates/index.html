<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusShare AI</title>
    <!-- Link to your custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🌐 NexusShare AI</h1>
        <h2>Local Network File Hub</h2>
        <hr>
        
        <!-- Only keep this one glass panel section! -->
        <div class="glass-panel">
            <div class="upload_section">
                <div id="drop-zone" class="drop-zone glass-panel">
                    <h3 style="margin-top: 0;">📥 Drag & Drop Files</h3>
                    <p>or click anywhere in this box to browse</p>
                    <input type="file" id="file-input" style="display: none;">
                </div>
                <p id="upload-status"></p>
            </div>
            <hr>
            <h2>Available Files</h2>
            <ul id="file-list">
                <!-- JS injects files here -->
            </ul>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
